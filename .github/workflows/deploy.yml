# GitHub Pages 部署工作流

name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # cleanUrls: true 在 GitHub Pages 上需要为每个 .html 生成同名目录的 index.html
      - name: Fix cleanUrls for GitHub Pages
        run: |
          find .vitepress/dist -name "*.html" | while read -r f; do
            dir="${f%.html}"
            if [ "$(basename "$f")" = "index.html" ] && [ "$(dirname "$f")" = "$dir" ]; then
              continue
            fi
            mkdir -p "$dir"
            cp "$f" "$dir/index.html"
          done
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
