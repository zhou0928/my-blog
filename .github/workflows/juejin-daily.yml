name: Daily Juejin Auto Post

on:
  schedule:
    # 每天北京时间上午 10 点（UTC 02:00）
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-post:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: '22'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fetch and generate post
        run: node --experimental-strip-types scripts/fetch-juejin-hot.ts

      - name: Generate RSS
        run: node --experimental-strip-types scripts/generate-rss.ts

      - name: Generate OG images
        run: node --experimental-strip-types scripts/generate-og.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          if git diff --cached --quiet; then
            echo "没有新文章，跳过提交"
          else
            git commit -m "📝 Auto: daily frontend hot post from Juejin"
            git push
          fi
